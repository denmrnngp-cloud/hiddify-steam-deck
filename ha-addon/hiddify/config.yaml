name: "Hiddify VPN"
description: "VPN client powered by sing-box. Masks all traffic via VLESS, VMess, Trojan, Hysteria2, TUIC, Reality. Add your subscription URL or proxy link."
version: "1.9.0"
slug: "hiddify"
init: false
homeassistant_api: true

arch:
  - amd64
  - aarch64

options:
  subscription_url: ""
  selected_profile: 0
  tun_mode: true
  log_level: "info"
  proxy_domains: "spotify.com,scdn.co,spotifycdn.com"

schema:
  subscription_url: str
  selected_profile: int
  tun_mode: bool
  log_level: list(info|debug|warn|error)
  proxy_domains: str

ports:
  17078/tcp: null

ports_description:
  17078/tcp: "Hiddify gRPC control port"

privileged:
  - NET_ADMIN
  - NET_RAW
  - SYS_PTRACE

capabilities:
  - NET_ADMIN
  - NET_RAW
  - NET_BIND_SERVICE

host_network: true

kernel_modules:
  - tun

devices:
  - /dev/net/tun:/dev/net/tun

map:
  - config:rw
  - ssl:ro

ingress: true
ingress_port: 8080
ingress_panel: true

panel_icon: mdi:vpn
panel_title: Hiddify VPN
